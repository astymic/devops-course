---
- name: Налаштування сервера для training-project
  hosts: devservers
  become: yes

  vars:
    app_user: training
    app_home: /home/training
    app_dir: /opt/training-app
    app_repo: "https://github.com/astymic/devops-course.git"
    app_code_subdir: "devops-ai-assistant/10_Implementation/01_vm/training-project"
    app_code_dir: "{{ app_dir }}/repo/devops-ai-assistant/10_Implementation/01_vm/training-project"

  tasks:
    - name: Створити користувача для додатку
      user:
        name: "{{ app_user }}"
        shell: /bin/bash
        create_home: yes
        home: "{{ app_home }}"
        groups: []
        state: present

    - name: Встановити необхідні пакети
      apt:
        name:
          - git
          - python3
          - python3-pip
          - python3-venv
        state: present
        update_cache: yes

    - name: Встановити Docker
      apt:
        name:
          - docker.io
          - docker-compose-v2
        state: present
        update_cache: yes

    - name: Додати користувача training до групи docker
      user:
        name: "{{ app_user }}"
        groups: docker
        append: yes

    - name: Створити директорію додатку
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0755'

    - name: Створити директорію для конфігурації
      file:
        path: "{{ app_home }}/.config"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0700'

    - name: Клонувати репозиторій training-project
      git:
        repo: "{{ app_repo }}"
        dest: "{{ app_dir }}/repo"
        version: main
      become_user: "{{ app_user }}"

    - name: Створити файл .env
      copy:
        content: |
          PORT=5000
          POSTGRES_PASSWORD={{ db_password }}
        dest: "{{ app_dir }}/.env"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0600'
      notify:
        - Restart training-app

    - name: Встановити Python-залежності додатку
      pip:
        requirements: "{{ app_code_dir }}/requirements.txt"
        virtualenv: "{{ app_dir }}/venv"
        virtualenv_command: /usr/bin/python3 -m venv
      become_user: "{{ app_user }}"

    - name: Створити символічне посилання на app.py
      file:
        src: "{{ app_code_dir }}/app.py"
        dest: "{{ app_dir }}/app.py"
        state: link
        owner: "{{ app_user }}"
        group: "{{ app_user }}"

    - name: Скопіювати unit-файл сервісу
      copy:
        src: training-app.service
        dest: /etc/systemd/system/training-app.service
        owner: root
        group: root
        mode: '0644'
      notify:
        - Reload systemd
        - Restart training-app

    - name: Активувати автозапуск сервісу
      systemd:
        name: training-app
        enabled: yes

    - name: Запустити сервіс
      systemd:
        name: training-app
        state: started

    - name: Створити символічне посилання на docker-compose.yml
      file:
        src: "{{ app_code_dir }}/docker-compose.yml"
        dest: "{{ app_dir }}/docker-compose.yml"
        state: link
        owner: "{{ app_user }}"
        group: "{{ app_user }}"

    - name: Запустити PostgreSQL контейнер
      command: docker compose up -d
      args:
        chdir: "{{ app_dir }}"

  handlers:
    - name: Reload systemd
      systemd:
        daemon_reload: yes

    - name: Restart training-app
      systemd:
        name: training-app
        state: restarted
